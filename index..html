<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>Responsive Photo Gallery</title>

  <link rel="stylesheet" href="style.css">
  
  </head>

<body>

  <main>

    <section class="gallery">

      <figure>

        <img src="images/photo1.jpg" alt="A scenic mountain view">

        <figcaption>Exploring the peaceful mountains.</figcaption>

      </figure>

      <figure>
        
        <img src="images/photo2.jpg" alt="City skyline at sunset">
        <figcaption>The city glows as the sun sets.</figcaption>
      </figure>
      <figure>
        <img src="images/photo3.jpg" alt="Forest path in autumn">
        <figcaption>A walk through colorful woods.</figcaption>
      </figure>
      <figure>
        <img src="images/photo4.jpg" alt="Ocean waves crashing on rocks">
        <figcaption>Powerful waves at the coast.</figcaption>
      </figure>
      <figure>
        
        
  <img src="images/photo5.jpg" alt="Desert landscape under blue sky">

        <figcaption>Vast and open desert view.</figcaption>

      </figure>

    </section>

  </main>

</body>

</html>
